<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon.png" class="logo">
      <h2>NotebookLM Enhancer</h2>
      <div class="header-toggle">
        <label class="switch">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div id="trial-info" class="section">
      <div class="status-badge" id="status-text">Checking status...</div>
      <p id="trial-desc">Calculating remaining days...</p>
    </div>

    <div id="activation-section" class="section">
      <input type="text" id="license-input" placeholder="Enter License Key...">
      <button id="activate-btn">Activate Lifetime Access</button>
      <div id="error-msg" class="error-msg"></div>
    </div>

    <!-- ===== 暂时隐藏：Gemini API Key 设定区 (Pro 功能尚未发布) ===== -->

        <b>[Pro Feature]</b> Extract Editable PPT/PDF requires a free Gemini API Key from Google AI Studio.
      </div>
      <input type="password" id="gemini-api-key" placeholder="Enter Gemini API Key...">
      <button id="save-gemini-btn" style="background-color: #34a853;">Save API Key</button>
      <div id="gemini-status" style="font-size: 12px; margin-top: 6px; color: #34a853; text-align: center;"></div>
    </div>
    -->
    <!-- ===================================== -->

    <div class="footer">
      <a href="https://gumroad.com/l/cxzucm" target="_blank" class="buy-link" id="buy-link">Get a license on Gumroad</a>
      <div class="footer-row">
        <button id="share-btn" class="share-btn">
          <span class="material-symbols-outlined">share</span>
          Share
        </button>
        <div class="version">v1.7.5</div>
      </div>
    </div>
  </div>
  <script src="scripts/storage.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
