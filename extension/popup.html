<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>

<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon.png" class="logo">
      <h2>NotebookLM Enhancer</h2>

        <label class="switch">

          <span class="slider round"></span>

    </div>

    <div id="sliderev-intro" class="section sliderev-promo">
      <div class="promo-header">
        <span class="material-symbols-outlined promo-icon">rocket_launch</span>
        <div id="promo-title" class="promo-title">SlideRev</div>
      </div>
      <p class="promo-desc">
        Turning your AI-generated snapshots into professional, editable PPTX assets.
      </p>
      <div class="promo-actions-group">
        <button id="learn-more-btn" class="promo-btn-secondary">
          <span class="material-symbols-outlined">info</span>
          Learn More
        </button>
        <a id="promo-btn" href="https://apps.apple.com/us/app/slide-rev/id6761469500?mt=12" target="_blank"
          class="promo-btn-primary">
          <span id="promo-btn-text">Get App</span>
          <svg class="app-store-icon" viewBox="0 0 384 512" width="14" height="14" style="margin-left: 2px;">
            <path fill="currentColor"

          </svg>
        </a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-row">
        <button id="share-btn" class="share-btn">
          <span class="material-symbols-outlined">share</span>
          Share
        </button>
        <div class="version" id="ext-version">v1.8.1 (Free)</div>
      </div>
    </div>
  </div>
  <script src="scripts/storage.js"></script>
  <script src="scripts/popup.js"></script>
</body>

</html>
