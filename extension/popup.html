<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon.png" class="logo">
      <h2>NotebookLM Enhancer</h2>
    </div>

    <div id="trial-info" class="section">
      <div class="status-badge" id="status-text">Checking status...</div>
      <p id="trial-desc">Calculating remaining days...</p>
    </div>

    <div id="activation-section" class="section">
      <input type="text" id="license-input" placeholder="Enter License Key...">
      <button id="activate-btn">Activate Lifetime Access</button>
      <div id="error-msg" class="error-msg"></div>
    </div>

    <div class="footer">
      <a href="https://gumroad.com/l/cxzucm" target="_blank" class="buy-link">Get a license on Gumroad</a>
      <div class="version">v1.1.3</div>
    </div>
  </div>
  <script src="scripts/storage.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
